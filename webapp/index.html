<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Falhas e Soluções</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <section id="auth-screen" class="auth-page">
      <div class="auth-hero" aria-hidden="true">
        <span class="auth-badge">Painel operacional</span>
        <h1>Falhas e Soluções</h1>
        <p>Registre ocorrências, consulte soluções e acompanhe o histórico de manutenção com segurança.</p>
      </div>
      <div class="card auth-card">
        <div class="auth-logo" aria-hidden="true">FS</div>
        <p class="auth-kicker">Acesso restrito</p>
        <h2>Entrar</h2>
        <p>Faça login com sua conta Google corporativa da Trivia Trens.</p>
        <button id="google-login-btn" class="google-btn" type="button">Continuar com Google</button>
      </div>
    </section>

    <main id="app-shell" class="hidden app-shell">
      <div id="topbar-host"></div>
      <section id="view-host" class="container"></section>
    </main>

    <script type="module" src="main.js"></script>
  </body>
</html>

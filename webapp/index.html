<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trivia Trens - Login</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <section id="auth-screen" class="card">
        <div id="login-form">
          <h1>Login</h1>
          <input id="email" type="email" placeholder="E-mail" />
          <input id="password" type="password" placeholder="Senha" />
          <button id="login-btn">Entrar</button>
          <button id="show-register-btn" class="secondary-btn" type="button">Quero me registrar</button>
        </div>

        <div id="register-form" class="hidden">
          <h1>Registrar</h1>
          <input id="register-email" type="email" placeholder="E-mail corporativo" />
          <input id="register-password" type="password" placeholder="Senha" />
          <button id="register-btn">Registrar</button>
          <button id="show-login-btn" class="secondary-btn" type="button">Já tenho conta</button>
          <p class="hint">Somente e-mails @triviatrens.com.br</p>
        </div>
      </section>

      <section id="change-password-screen" class="card hidden">
        <h1>Troca obrigatória de senha</h1>
        <p>Você está com senha padrão. Defina uma nova senha.</p>
        <input id="new-password" type="password" placeholder="Nova senha" />
        <input id="confirm-password" type="password" placeholder="Confirmar nova senha" />
        <button id="change-password-btn">Salvar nova senha</button>
      </section>

      <section id="home-screen" class="card hidden">
        <h1>Bem-vindo</h1>
        <p id="welcome-text"></p>
        <button id="logout-btn">Sair</button>
      </section>
    </main>

    <script type="module" src="main.js"></script>
  </body>
</html>

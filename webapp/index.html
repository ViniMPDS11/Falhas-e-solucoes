<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Falhas e Soluções - Login</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <section id="auth-screen" class="card">
        <h1>Entrar</h1>
        <p>Faça login com sua conta Google.</p>
        <button id="google-login-btn" class="google-btn" type="button">Continuar com Google</button>
      </section>

      <section id="home-screen" class="card hidden">
        <h1>Bem-vindo</h1>
        <p id="welcome-text"></p>
        <button id="logout-btn">Sair</button>
      </section>
    </main>

    <script type="module" src="main.js"></script>
  </body>
</html>
